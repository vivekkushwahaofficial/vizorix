spring:
  application:
    name: vizorix-api
  profiles:
    active: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false

server:
  port: 8080

# Spring Boot Actuator settings
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Custom application configuration properties mapping
vizorix:
  api:
    app-title: Vizorix Execution API
    app-description: Vizorix backend API compilation and execution coordination runner
    version: 0.1.0-SNAPSHOT
